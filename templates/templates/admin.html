<div id="order-list" style="max-width: 600px; margin: auto;">
    {% if orders %}
        {% for order in orders %}
        <div style="background: white; border-radius: 12px; padding: 20px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
            <div style="display: flex; justify-content: space-between;">
                <h3 style="margin: 0; color: #005088;">📦 {{ order.item }}</h3>
                <span style="background: #eee; padding: 5px 10px; border-radius: 20px; font-size: 14px;">{{ order.status }}</span>
            </div>
            <p style="font-size: 20px; font-weight: bold; margin: 15px 0;">운송비: {{ order.price }}</p>
            
            {% if order.status == '대기중' %}
            <button onclick="accept({{ order.id }})" style="width: 100%; padding: 12px; background:#11caa0; color:white; border:none; border-radius:8px; font-size: 16px; font-weight: bold; cursor: pointer;">
                오더 수락하기
            </button>
            {% else %}
            <button disabled style="width: 100%; padding: 12px; background:#ccc; color:white; border:none; border-radius:8px; font-size: 16px;">
                배차 완료
            </button>
            {% endif %}
        </div>
        {% endfor %}
    {% else %}
        <p style="text-align: center; padding: 50px; color: #888;">현재 대기 중인 오더가 없습니다.</p>
    {% endif %}
</div>

<script>
    function accept(id) {
        fetch('/api/accept/' + id, {method: 'POST'})
        .then(res => res.json())
        .then(data => {
            if(data.status === 'success') {
                alert('배차가 완료되었습니다!');
                location.reload();
            } else {
                alert(data.message);
                location.reload();
            }
        });
    }
    setInterval(() => location.reload(), 30000); // 30초마다 자동 새로고침
</script>
