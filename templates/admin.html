<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>기사님 보드</title></head>
<body>
    <h2>📲 실시간 오더 현황</h2>
    {% for order in orders %}
    <div style="border:1px solid #ccc; padding:10px; margin-bottom:10px;">
        <p>품목: {{ order.item }} / 가격: {{ order.price }}</p>
        <button onclick="location.reload()">수락하기</button>
    </div>
    {% endfor %}
</body>
</html>
