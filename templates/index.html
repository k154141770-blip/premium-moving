<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>프리미엄 운송 견적</title>
</head>
<body style="font-family:sans-serif; padding:20px; max-width: 500px; margin: auto;">
    <h2>🚚 프리미엄 운송 견적</h2>
    <input type="text" id="item" placeholder="품목 입력" style="width:100%; padding:10px;">
    <button onclick="sendOrder()" style="width:100%; padding:10px; margin-top:10px;">견적 요청하기</button>
    <script>
        function sendOrder() {
            const item = document.getElementById('item').value;
            fetch('/api/order', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({item: item, price: '180,000원'})
            }).then(() => alert('전송 완료!'));
        }
    </script>
</body>
</html>
