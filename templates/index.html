<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>프리미엄 운송 견적</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Malgun Gothic", sans-serif; 
            background-color: #f2f5f8; 
            margin: 0; padding: 20px; 
            display: flex; justify-content: center; align-items: center; min-height: 100vh; 
        }
        .main-card { 
            background: #ffffff; width: 100%; max-width: 480px; 
            padding: 40px 25px; border-radius: 30px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.1); 
        }
        .header-section { text-align: center; margin-bottom: 35px; }
        .header-section h1 { color: #005088; font-size: 28px; margin: 0 0 10px 0; }
        .header-section p { color: #777; font-size: 16px; margin: 0; line-height: 1.5; }
        
        .input-group { margin-bottom: 30px; }
        .input-group label { display: block; font-weight: bold; margin-bottom: 12px; color: #333; font-size: 17px; }
        .input-group input { 
            width: 100%; padding: 20px; border: 2px solid #eee; 
            border-radius: 16px; font-size: 18px; outline: none; background-color: #fafafa;
        }
        .input-group input:focus { border-color: #005088; background-color: #fff; }
        
        .submit-btn { 
            width: 100%; padding: 22px; background: #005088; color: white; 
            border: none; border-radius: 18px; font-size: 20px; font-weight: bold; 
            cursor: pointer; box-shadow: 0 8px 20px rgba(0,80,136,0.25);
        }
        .submit-btn:active { transform: scale(0.97); background: #003a63; }
        
        .info-text { text-align: center; margin-top: 25px; font-size: 14px; color: #aaa; }
    </style>
</head>
<body>
    <div class="main-card">
        <div class="header-section">
            <h1>🚚 프리미엄 운송</h1>
            <p>AS 경력 전문가가 직접 배차합니다<br>안전하고 정확한 이동 서비스</p>
        </div>
        <div class="input-group">
            <label>무엇을 옮겨드릴까요?</label>
            <input type="text" id="item_name" placeholder="예: 75인치 TV, 안마의자 등" autocomplete="off">
        </div>
        <button class="submit-btn" onclick="requestOrder()">무료 견적 요청하기</button>
        <div class="info-text">요청 즉시 기사님 관리 화면으로 전송됩니다.</div>
    </div>

    <script>
        function requestOrder() {
            const inputField = document.getElementById('item_name');
            const itemName = inputField.value.trim();
            if(!itemName) { alert('운송하실 물품 이름을 입력해주세요!'); return; }
            
            const btn = document.querySelector('.submit-btn');
            btn.innerText = '신청 접수 중...';
            btn.disabled = true;

            fetch('/api/order', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({item: itemName, price: '상담 후 결정'})
            })
            .then(res => res.json())
            .then(data => {
                if(data.status === 'success') {
                    alert('신청이 완료되었습니다!\n기사님이 확인 후 바로 연락드리겠습니다.');
                    inputField.value = '';
                }
            })
            .catch(err => alert('연결이 불안정합니다.'))
            .finally(() => {
                btn.innerText = '무료 견적 요청하기';
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
