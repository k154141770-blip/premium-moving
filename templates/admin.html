<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>기사님 관리자 모드</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Malgun Gothic", sans-serif; 
            background-color: #e9ecef; margin: 0; padding: 15px; 
        }
        .header { 
            background: #005088; color: white; padding: 20px; 
            border-radius: 15px; text-align: center; margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .header h2 { margin: 0; font-size: 22px; }
        
        .order-card { 
            background: white; border-radius: 18px; padding: 20px; 
            margin-bottom: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            border-left: 8px solid #005088;
        }
        .order-info { margin-bottom: 15px; }
        .order-item { font-size: 20px; font-weight: bold; color: #333; margin-bottom: 5px; }
        .order-price { font-size: 24px; color: #d63031; font-weight: 800; }
        
        .status-badge {
            display: inline-block; padding: 5px 12px; border-radius: 20px;
            font-size: 13px; font-weight: bold; background: #eee; margin-bottom: 10px;
        }

        .accept-btn { 
            width: 100%; padding: 18px; background: #11caa0; color: white; 
            border: none; border-radius: 12px; font-size: 18px; font-weight: bold; 
            cursor: pointer; transition: 0.2s;
        }
        .accept-btn:active { background: #0da885; transform: scale(0.98); }
        
        .no-order { text-align: center; padding: 50px; color: #888; font-size: 16px; }
    </style>
</head>
<body>
    <div class="header">
        <h2>📲 실시간 오더 게시판</h2>
    </div>

    <div id="order-container">
        {% if orders %}
            {% for order in orders %}
            <div class="order-card">
                <div class="status-badge">{{ order.status }}</div>
                <div class="order-info">
                    <div class="order-item">📦 {{ order.item }}</div>
                    <div class="order-price">운송비: {{ order.price }}</div>
                </div>
                
                {% if order.status == '대기중' %}
                <button class="accept-btn" onclick="acceptOrder({{ order.id }})">오더 수락하기</button>
                {% endif %}
            </div>
            {% endfor %}
        {% else %}
            <div class="no-order">현재 들어온 오더가 없습니다.</div>
        {% endif %}
    </div>

    <script>
        function acceptOrder(id) {
            if(!confirm('이 오더를 수락하시겠습니까?')) return;
            
            fetch('/api/accept/' + id, { method: 'POST' })
            .then(res => res.json())
            .then(data => {
                if(data.status === 'success') {
                    alert('배차가 완료되었습니다! 고객님께 연락하세요.');
                    location.reload();
                } else {
                    alert('이미 완료된 오더이거나 오류가 발생했습니다.');
                }
            })
            .catch(err => alert('서버 연결 오류'));
        }
        
        // 30초마다 자동으로 새로고침해서 새 오더 확인
        setTimeout(() => location.reload(), 30000);
    </script>
</body>
</html>
